<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="calender">
            <div class="left">
                <p id="date">01</p>
                <p id="day">Sunday</p>
            </div>
            <div class="right">
                <p id="month">January</p>
                <p id="year">2020</p>
            </div>
        </div>
    </div>

    <script>
        let date = document.getElementById("date");
        let day = document.getElementById("day");
        let maoth = document.getElementById("month");
        let year = document.getElementById("year");

        let today = new Date();
        // console.log(today);

        let weekDay = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        let allMonth = ["January","February","March","April","May","June","July","August","September","October","November","December"];


        date.innerHTML =(today.getDate()<10 ? "0" : "") + today.getDate();
        day.innerHTML = weekDay[today.getDay()];
        month.innerHTML =allMonth[today.getMonth()];
        year.innerHTML = today.getFullYear();
    </script>
</body>
</html>
